name: Release

# Cut a release by pushing a version tag, e.g.:  git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and attach assets to (e.g. v0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
          - os: macos-13          # Intel x86_64
            suffix: macos-intel
          - os: macos-14          # Apple Silicon arm64
            suffix: macos-apple-silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build (PyInstaller)
        run: pyinstaller packaging/rb2traktor.spec --distpath dist --workpath build --noconfirm

      - name: Resolve tag name
        id: tag
        shell: bash
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/rb2traktor -DestinationPath "rb2traktor-${{ steps.tag.outputs.name }}-${{ matrix.suffix }}.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/rb2traktor.app "rb2traktor-${{ steps.tag.outputs.name }}-${{ matrix.suffix }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.suffix }}
          path: "*.zip"
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach zips to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: rb2traktor ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*.zip
          fail_on_unmatched_files: true
